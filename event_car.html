<!DOCTYPE html>
<html lang="ko">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>실습 2: 키보드 자동차</title>

    <style>
        /* 1. 레이싱 서킷(아스팔트 도로) 배경 설정 */
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            height: 100vh;
            overflow: hidden;
            /* 스크롤바 방지 */
            font-family: 'Malgun Gothic', sans-serif;

            /* 실제 아스팔트 도로 느낌이 나도록 어두운 흑회색 배경 지정 */
            background-color: #334155;

            /* CSS 내장 기능으로 도로의 하얀색 점선(중앙선)을 화면 전체에 격자 형태로 연출 */
            background-image:
                linear-gradient(90deg, transparent 49%, rgba(255, 255, 255, 0.15) 49%, rgba(255, 255, 255, 0.15) 51%, transparent 51%),
                linear-gradient(rgba(255, 255, 255, 0.2) 10%, transparent 10%);
            background-size: 160px 60px;
            /* 차선처럼 보이게 간격 조절 */
        }

        /* 2. 경기 시작점 (출발선 스타트 라인) 디자인 */
        body::before {
            content: "";
            position: absolute;
            top: 0;
            left: 50px;
            /* 초기 자동차 위치 뒤쪽에 배치 */
            width: 40px;
            height: 100vh;
            /* 레이싱 대회 특유의 검은색/흰색 체크무늬(체커 플래그) 패턴 */
            background-image:
                linear-gradient(45deg, #222 25%, transparent 25%, transparent 75%, #222 75%, #222),
                linear-gradient(45deg, #222 25%, #fff 25%, #fff 75%, #222 75%, #222);
            background-size: 20px 20px;
            background-position: 0 0, 10px 10px;
            opacity: 0.3;
            z-index: 1;
        }

        /* 3. 조종 가이드 패널 */
        .header-panel {
            position: fixed;
            top: 20px;
            left: 20px;
            z-index: 10;
            background-color: rgba(255, 255, 255, 0.95);
            padding: 18px 22px;
            border-radius: 12px;
            box-shadow: 0 10px 20px rgba(0, 0, 0, 0.3);
            border-left: 5px solid #ff4757;
        }

        .header-panel h3 {
            color: #1e293b;
            font-size: 1.15rem;
            margin-bottom: 4px;
        }

        .header-panel p {
            color: #64748b;
            font-size: 0.85rem;
            font-weight: bold;
        }

        /* 4. 스포츠카 테마 자동차 디자인 */
        #car {
            position: absolute;
            /* 절대 위치 지정 (필수) */
            left: 100px;
            /* 초기 x좌표 원본 복구 */
            top: 100px;
            /* 초기 y좌표 원본 복구 */
            width: 90px;
            height: 45px;

            /* 화려한 네온 오렌지-레드 그라데이션 */
            background: linear-gradient(135deg, #ff4757, #ff6b81);
            border-radius: 8px;

            color: white;
            font-weight: bold;
            text-align: center;
            line-height: 45px;
            font-size: 0.95rem;
            letter-spacing: 1px;
            z-index: 5;

            /* 차체 바닥에서 뿜어져 나오는 화려한 네온 언더글로우 조명 효과 */
            box-shadow: 0 0 20px #ff4757, 0 4px 10px rgba(0, 0, 0, 0.5);

            /* 움직일 때 아주 미세하게 부드러운 느낌을 주는 변환 효과 */
            transition: left 0.04s linear, top 0.04s linear;
        }

        /* 자동차 바퀴 디테일 */
        #car::before,
        #car::after {
            content: "";
            position: absolute;
            width: 16px;
            height: 7px;
            background-color: #0f172a;
            border-radius: 2px;
        }

        #car::before {
            top: -6px;
            left: 12px;
            box-shadow: 50px 0 #0f172a;
        }

        #car::after {
            bottom: -6px;
            left: 12px;
            box-shadow: 50px 0 #0f172a;
        }

        /* 5. 레이싱 계기판 스타일 좌표 디스플레이 */
        #info {
            position: fixed;
            bottom: 20px;
            left: 20px;
            padding: 12px 20px;
            background: rgba(15, 23, 42, 0.9);
            color: #00ecff;
            border: 1px solid #00ecff;
            border-radius: 8px;
            font-family: 'Courier New', monospace;
            font-weight: bold;
            font-size: 0.95rem;
            box-shadow: 0 10px 20px rgba(0, 0, 0, 0.4);
            z-index: 10;
        }
    </style>

    <script>
        var x = 100;
        var y = 100;
        var step = 10; // 이동 거리

        window.onload = function () {
            var car = document.getElementById("car");
            var info = document.getElementById("info");

            document.onkeydown = function (e) {
                // 실시간 브라우저 창의 너비와 높이 구하기
                var maxWidth = window.innerWidth;
                var maxHeight = window.innerHeight;

                // 자동차 요소의 실제 가로폭(90)과 세로폭(45) 가져오기
                var carWidth = car.offsetWidth;
                var carHeight = car.offsetHeight;

                // 37:왼쪽, 38:위, 39:오른쪽, 40:아래
                switch (e.keyCode) {
                    case 37: // [왼쪽] 0보다 클 때만 이동 가능
                        if (x - step >= 0) {
                            x -= step;
                        }
                        break;
                    case 38: // [위쪽] 0보다 클 때만 이동 가능
                        if (y - step >= 0) {
                            y -= step;
                        }
                        break;
                    case 39: // [오른쪽] 화면 오른쪽 끝(창 너비 - 자동차 폭)을 넘지 않을 때만 이동 가능
                        if (x + step + carWidth <= maxWidth) {
                            x += step;
                        }
                        break;
                    case 40: // [아래쪽] 화면 아래쪽 끝(창 높이 - 자동차 높이)을 넘지 않을 때만 이동 가능
                        if (y + step + carHeight <= maxHeight) {
                            y += step;
                        }
                        break;
                }

                // 변경된 좌표를 실제 DOM 요소에 적용
                car.style.left = x + "px";
                car.style.top = y + "px";

                // 좌표 정보 출력
                info.innerHTML = "현재 좌표 (x, y) = (" + x + ", " + y + ")";
            }
        }
    </script>
</head>

<body>

    <div class="header-panel">
        <h3>🏁 실습 2: 키보드 자동차</h3>
        <p>방향키(←, ↑, →, ↓)를 눌러 자유롭게 운전해보세요.</p>
    </div>

    <div id="car">Car</div>

    <div id="info">현재 좌표 (x, y) = (100, 100)</div>

</body>

</html>
