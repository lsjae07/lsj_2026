<!DOCTYPE html>
<html lang="ko">

<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>인터넷활용 실습 템플릿</title>

  <style>
    /* 1. 기본 여백 초기화 및 부드러운 글꼴 설정 */
    * {
      margin: 0;
      padding: 0;
      box-sizing: border-box;
    }

    body {
      font-family: 'Malgun Gothic', sans-serif;
      background-color: #f0f2f5;
      /* 깔끔한 연회색 배경 */
      color: #333333;
      line-height: 1.6;
    }

    /* 2. 상단 헤더 (이름 영역) */
    header {
      background: linear-gradient(135deg, #4f46e5, #7c3aed);
      /* 트렌디한 보라색 그라데이션 */
      color: white;
      text-align: center;
      padding: 50px 20px;
    }

    header h1 {
      font-size: 2.5rem;
      letter-spacing: 2px;
      margin-bottom: 10px;
    }

    header .subtitle {
      font-size: 1.1rem;
      opacity: 0.85;
    }

    /* 3. 네비게이션 메뉴 바 스타일링 */
    nav {
      background-color: #ffffff;
      display: flex;
      justify-content: center;
      box-shadow: 0 4px 6px -1px rgba(0, 0, 0, 0.1);
      position: sticky;
      top: 0;
      z-index: 100;
    }

    nav a {
      color: #4b5563;
      text-decoration: none;
      padding: 16px 24px;
      font-weight: bold;
      transition: all 0.2s ease;
    }

    nav a:hover {
      color: #4f46e5;
      background-color: #f3f4f6;
    }

    /* 4. 메인 컨텐츠 감싸는 상자 */
    .container {
      max-width: 650px;
      margin: 40px auto;
      padding: 0 20px;
    }

    /* 5. 사용자가 요청한 section 디자인 */
    section {
      background-color: #ffffff;
      padding: 35px;
      border-radius: 16px;
      /* 모서리를 둥글게 */
      box-shadow: 0 10px 15px -3px rgba(0, 0, 0, 0.05);
      /* 부드러운 그림자 */
    }

    section h2 {
      color: #1f2937;
      border-left: 5px solid #4f46e5;
      /* 제목 왼쪽에 예쁜 보라색 세로선 추가 */
      padding-left: 12px;
      margin-bottom: 25px;
      font-size: 1.5rem;
    }

    /* 6. 자바스크립트(document.write) 결과 화면 커스텀 */
    section h3 {
      font-size: 1.2rem;
      color: #1f2937;
      margin-top: 15px;
      margin-bottom: 8px;
    }

    /* 입력한 항목들 텍스트 창 */
    section h3+p {
      background-color: #f8fafc;
      padding: 15px;
      border-radius: 8px;
      border: 1px solid #e2e8f0;
      color: #6b7280;
      font-size: 0.95rem;
      word-break: keep-all;
      /* 단어 단위로 예쁘게 줄바꿈 */
    }

    section hr {
      border: 0;
      height: 1px;
      background-color: #e5e7eb;
      margin: 25px 0;
    }

    /* ★ 최종 뽑기 결과 (대망의 선택 결과 h1 태그 강조) ★ */
    section h1 {
      font-size: 2.2rem;
      color: #4f46e5;
      text-align: center;
      background: linear-gradient(135deg, #eef2ff, #f3e8ff);
      /* 연한 보라빛 배경 패널 */
      padding: 25px;
      border-radius: 12px;
      margin: 20px 0;
      border: 2px dashed #7c3aed;
      /* 보라색 점선 테두리 */
      animation: pulse 1.5s infinite;
      /* 시선을 사로잡는 미세한 깜빡임 효과 */
    }

    /* 하단 안내 문구 */
    section h1+p {
      text-align: center;
      color: #9ca3af;
      font-size: 0.9rem;
    }

    /* 7. 하단 푸터 (하단 이름 영역) */
    footer {
      text-align: center;
      padding: 40px 20px;
      color: #9ca3af;
      font-size: 0.9rem;
    }
  </style>
</head>

<body>

  <header>
    <h1> Seung Jae LEE</h1>
    <p class="subtitle">반갑습니다. </p>
  </header>

  <nav>
    <a href="index.html">Home</a>
    <a href="about.html">About</a>
    <a href="portfolio.html">Portfolio</a>
    <a href="contact.html">Contact</a>
  </nav>

  <main class="container">
    <section>
      <h2>String + Array + Math 조합: 내맘대로 뽑기</h2>

      <script>
        // 1. String: prompt()로 사용자에게 '문자열' 입력받기
        let defaultList = "제육볶음,돈까스,순대국,김치찌개,햄버거,초밥,파스타,샐러드,떡볶이,마라탕,사과,바나나,딸기,수박";
        let inputString = prompt("항목을 콤마(,)로 구분하여 입력하세요", defaultList);

        // 사용자가 '취소'를 누른 경우
        if (!inputString) {
          document.write("<h3>뽑기를 취소했습니다.</h3>");
        } else {

          // 2. Array: String.split(',') 메소드로 '문자열'을 '배열'로 변환
          let items = inputString.split(',');

          // 3. Math: Math.random()과 Math.floor()로 랜덤 인덱스 뽑기
          let index = Math.floor(Math.random() * items.length);

          // 4. 결과 출력
          document.write("<h3>입력한 항목 (총 " + items.length + "개):</h3>");
          document.write("<p>" + inputString + "</p>");
          document.write("<hr>");
          document.write("<h3> 당신의 선택은...</h3>");

          // .trim() : 공백 제거
          let choice = items[index].trim();

          document.write("<h1> " + choice + " !!!!</h1>");
          document.write("<p><i>새로고침(F5)을 눌러 다시 뽑을 수 있습니다.</i></p>");
        }
      </script>

    </section>
  </main>

  <footer>
    <small>&copy; <span id="year"></span> 이름: 이승재</small>
  </footer>

  <script src="script.js"></script>
</body>

</html>
