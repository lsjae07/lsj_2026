<!DOCTYPE html>
<html lang="ko">

<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>인터넷활용 실습 템플릿</title>

  <style>
    /* 1. 기본 여백 초기화 및 부드러운 글꼴 설정 */
    * {
      margin: 0;
      padding: 0;
      box-sizing: border-box;
    }

    body {
      font-family: 'Malgun Gothic', sans-serif;
      background-color: #f0f2f5;
      /* 깔끔한 연회색 배경 */
      color: #333333;
      line-height: 1.6;
    }

    /* 2. 상단 헤더 (이름 영역) */
    header {
      background: linear-gradient(135deg, #4f46e5, #7c3aed);
      /* 트렌디한 보라색 그라데이션 */
      color: white;
      text-align: center;
      padding: 50px 20px;
    }

    header h1 {
      font-size: 2.5rem;
      letter-spacing: 2px;
      margin-bottom: 10px;
    }

    header .subtitle {
      font-size: 1.1rem;
      opacity: 0.85;
    }

    /* 3. 네비게이션 메뉴 바 스타일링 */
    nav {
      background-color: #ffffff;
      display: flex;
      justify-content: center;
      box-shadow: 0 4px 6px -1px rgba(0, 0, 0, 0.1);
      position: sticky;
      top: 0;
      z-index: 100;
    }

    nav a {
      color: #4b5563;
      text-decoration: none;
      padding: 16px 24px;
      font-weight: bold;
      transition: all 0.2s ease;
    }

    nav a:hover {
      color: #4f46e5;
      background-color: #f3f4f6;
    }

    /* 4. 메인 컨텐츠 감싸는 상자 */
    .container {
      max-width: 650px;
      margin: 40px auto;
      padding: 0 20px;
    }

    /* 5. 사용자가 요청한 section 디자인 */
    section {
      background-color: #ffffff;
      padding: 35px;
      border-radius: 16px;
      /* 모서리를 둥글게 */
      box-shadow: 0 10px 15px -3px rgba(0, 0, 0, 0.05);
      /* 부드러운 그림자 */
    }

    section h2 {
      color: #1f2937;
      border-left: 5px solid #4f46e5;
      /* 대제목 왼쪽에 예쁜 보라색 세로선 추가 */
      padding-left: 12px;
      margin-bottom: 20px;
      font-size: 1.5rem;
    }

    /* 본문 소개 문구 */
    section p {
      font-size: 1.1rem;
      color: #4b5563;
      margin-bottom: 25px;
      background-color: #f8fafc;
      /* 연한 배경으로 강조 */
      padding: 15px;
      border-radius: 8px;
      border-left: 3px solid #7c3aed;
    }

    /* section 내부의 소제목 (학력, 관심 분야 등) */
    section h3 {
      font-size: 1.2rem;
      color: #1f2937;
      margin-top: 20px;
      margin-bottom: 10px;
    }

    /* 리스트 (<ul>, <li>) 스타일링 */
    section ul {
      list-style-type: none;
      /* 기본 점을 없애고 깔끔하게 화살표 기호로 커스텀 */
      margin-bottom: 25px;
      padding-left: 5px;
    }

    section li {
      position: relative;
      padding-left: 18px;
      margin-bottom: 8px;
      font-size: 0.95rem;
      color: #4b5563;
    }

    /* 리스트 앞에 보라색 작은 점 대신 세련된 포인트 큐브 추가 */
    section li::before {
      content: "•";
      position: absolute;
      left: 0;
      color: #4f46e5;
      font-weight: bold;
    }

    /* 6. 하단 푸터 (하단 이름 영역) */
    footer {
      text-align: center;
      padding: 40px 20px;
      color: #9ca3af;
      font-size: 0.9rem;
    }
  </style>
</head>

<body>

  <header>
    <h1> Seung Jae LEE</h1>
    <p class="subtitle">반갑습니다. </p>
  </header>

  <nav>
    <a href="index.html">Home</a>
    <a href="about.html">About</a>
    <a href="portfolio.html">Portfolio</a>
    <a href="contact.html">Contact</a>
  </nav>

  <main class="container">
    <section>
      <h2>About Me</h2>
      <p>간단 소개: 게임,스포츠 좋아함</p>
      <h3>학력</h3>
      <ul>
        <li>고등학교 졸업</li>
        <li>중학교 졸업</li>
      </ul>
      <h3>관심 분야</h3>
      <ul>
        <li>컴퓨터</li>
        <li>인공지능</li>
      </ul>
    </section>
  </main>

  <footer>
    <small>&copy; <span id="year"></span> 이름: 이승재</small>
  </footer>

  <script src="script.js"></script>
</body>

</html>
